name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'astramentor-backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'astramentor-backend/**'

jobs:
  test-and-lint:
    name: Install, Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: astramentor-backend

    env:
      # Dummy secrets — real values go in GitHub repository secrets
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/astramentor_test
      COGNITO_USER_POOL_ID: us-east-1_placeholder
      COGNITO_CLIENT_ID: placeholder_client_id
      REDIS_URL: redis://localhost:6379/0
      AWS_REGION: us-east-1
      ENVIRONMENT: test

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: astramentor_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: astramentor-backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          if [ -d "tests" ] && [ "$(ls -A tests)" ]; then
            python -m pytest tests/ -v --tb=short
          else
            echo "No tests found — skipping pytest"
          fi

      - name: Verify app imports without error
        run: python -c "from src.api.main import app; print('App import OK')"
