name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'astramentor-frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'astramentor-frontend/**'

jobs:
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: astramentor-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: astramentor-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npx tsc --noEmit --skipLibCheck 2>/dev/null || true

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_DEV_MODE: 'true'
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: us-east-1_placeholder
          NEXT_PUBLIC_COGNITO_USER_POOL_CLIENT_ID: placeholder
          NEXT_PUBLIC_COGNITO_IDENTITY_POOL_ID: us-east-1:placeholder
          NEXT_PUBLIC_OAUTH_DOMAIN: placeholder.auth.us-east-1.amazoncognito.com
          NEXT_PUBLIC_OAUTH_REDIRECT_SIGN_IN: http://localhost:3000/callback
          NEXT_PUBLIC_OAUTH_REDIRECT_SIGN_OUT: http://localhost:3000/
          NEXT_PUBLIC_OAUTH_RESPONSE_TYPE: code
          NEXT_PUBLIC_AWS_REGION: us-east-1
          NEXT_PUBLIC_ENABLE_ANALYTICS: 'false'
          NEXT_PUBLIC_ENABLE_ERROR_TRACKING: 'false'
        run: npm run build

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: astramentor-frontend/.next/
          retention-days: 7
