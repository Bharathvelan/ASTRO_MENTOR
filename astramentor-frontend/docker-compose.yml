version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: astramentor-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_COGNITO_USER_POOL_ID=${NEXT_PUBLIC_COGNITO_USER_POOL_ID}
      - NEXT_PUBLIC_COGNITO_USER_POOL_CLIENT_ID=${NEXT_PUBLIC_COGNITO_USER_POOL_CLIENT_ID}
      - NEXT_PUBLIC_COGNITO_IDENTITY_POOL_ID=${NEXT_PUBLIC_COGNITO_IDENTITY_POOL_ID}
      - NEXT_PUBLIC_OAUTH_DOMAIN=${NEXT_PUBLIC_OAUTH_DOMAIN}
      - NEXT_PUBLIC_OAUTH_REDIRECT_SIGN_IN=${NEXT_PUBLIC_OAUTH_REDIRECT_SIGN_IN}
      - NEXT_PUBLIC_OAUTH_REDIRECT_SIGN_OUT=${NEXT_PUBLIC_OAUTH_REDIRECT_SIGN_OUT}
      - NEXT_PUBLIC_OAUTH_RESPONSE_TYPE=${NEXT_PUBLIC_OAUTH_RESPONSE_TYPE}
    volumes:
      - ./src:/app/src:ro
      - ./public:/app/public:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - astramentor-network

networks:
  astramentor-network:
    driver: bridge
